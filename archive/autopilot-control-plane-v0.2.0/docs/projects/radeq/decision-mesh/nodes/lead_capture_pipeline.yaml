id: lead_capture_pipeline
type: data_flow
name: Lead capture pipeline
question: "Does this change affect the contact form, lead payload, validation, minimization, API route, or D1 storage?"
why: "Lead capture stores user-submitted data and must preserve validation, privacy minimization, D1 binding expectations, and controlled error responses."
signals:
  - lead
  - contact
  - form
  - api
  - d1
  - cloudflare
  - validation
related_agents:
  - frontend
  - backend_database
  - security
  - qa
related_files:
  - docs/projects/radeq/architecture.md
required_checks:
  - client_validation
  - server_validation
  - privacy_minimization
  - d1_binding_check
  - controlled_error_response
stop_conditions:
  - missing_server_validation
  - privacy_minimization_removed
  - d1_binding_unknown
objective:
  - Keep lead capture private, validated, and recoverable.
