id: domain_email_research
type: external_provider_research
name: Domain email provider research
question: "Does email work for radeq.cz distinguish forwarding, mailbox hosting, transactional mail, and form backend before any DNS or provider mutation?"
why: "The owner requested a safe, low-cost route for info@radeq.cz, poptavky@radeq.cz, and siroky@radeq.cz. On 2026-06-12 the owner confirmed Fastmail as the final provider, all three addresses working, and DMARC staying at p=none for monitoring."
signals:
  - email
  - domain mail
  - SPF
  - DKIM
  - DMARC
  - mailbox
  - forwarding
  - transactional mail
  - form backend
related_agents:
  - security
  - infrastructure
  - backend_database
  - qa
related_files:
  - docs/projects/radeq/work-log.md
  - C:/Users/sirok/Documents/Projects/radeq/src/lib/leadNotificationEmail.ts
required_checks:
  - official_provider_source_check
  - dns_read_only_check
  - privacy_and_spam_risk_check
  - no_cloudflare_mutation_without_owner_approval
  - mailbox_vs_forwarding_distinction
  - transactional_notification_fail_soft_check
stop_conditions:
  - provider_selected_without_owner_decision
  - dns_record_changed_without_owner_approval
  - transactional_mail_used_as_human_mailbox
  - form_backend_sends_from_client_side
objective:
  - "Track Fastmail as the selected human mailbox provider for radeq.cz while Cloudflare remains the DNS/control surface."
  - "Keep DMARC at p=none during initial monitoring, then consider quarantine/reject only after observed legitimate mail alignment."
  - "Keep forwarding, transactional mail, and form backend decisions separate from human mailbox hosting."
  - "For lead notifications, allow Cloudflare Email Sending only as a server-side transactional notification layer into the owner-confirmed Fastmail mailbox."
