id: model_reasoning_boundary
type: routing_policy
name: Free cloud reasoning boundary
question: "Does model routing use free/no-cost cloud reasoning only as verified advisory support?"
why: "Gemini and other free/no-cost cloud models can improve brainstorming, critique, validation, and second opinions, but Autopilot must keep routine worker loops local and block paid credits, unredacted private context, and model output as source of truth."
signals:
  - gemini
  - free model
  - cloud reasoning
  - brainstorming
  - critique
  - context7
  - best practices
  - second opinion
  - agent validation
  - model routing
related_agents:
  - architect
  - security
  - qa
  - design-critic
  - visual-analyst
related_files:
  - src/data/delivery-system/modelPolicy.ts
  - src/data/delivery-system/modelSpend.ts
  - docs/autopilot/delivery-system-model-policy.md
  - AGENTS.md
  - GEMINI.md
  - mcp/server.ts
required_checks:
  - provider_availability_verified
  - free_tier_or_no_cost_confirmed
  - redacted_context_only
  - context7_or_official_docs_verified
  - gemini_brainstorm_claims_labeled_and_verified
  - factual_claims_verified
  - smallest_safe_model_class
  - disclose_model_choice_when_risk_affects_delivery
stop_conditions:
  - provider_availability_unverified
  - paid_model_or_credit_required
  - cloud_model_for_routine_worker_loop
  - private_data_not_redacted
  - model_output_used_as_source_of_truth
  - technology_claim_without_context7_or_official_docs
  - gemini_claim_adopted_without_verification
  - model_choice_affects_risk_without_disclosure
objective:
  - Use Gemini and other free/no-cost cloud models as advisory reasoning when they add measurable review value.
  - Verify Gemini technology and best-practice brainstorm claims through Context7 when connected, or official documentation as fallback.
  - Preserve local workers as the default execution path.
  - Keep local tests, architecture records, and owner decisions as the source of truth.
