id: tool_inventory_boundary
type: routing_policy
name: Plugin, skill, and provider inventory boundary
question: "Does Autopilot use only current-session plugins, skills, MCP tools, and verified provider-policy records that are actually available?"
why: "The control plane can observe active plugins, local skills, cached plugin bundles, and model provider policy records, but cached bundles and provider-policy records must not become assumed callable capabilities or hidden dependencies."
signals:
  - plugin
  - skill
  - tool inventory
  - current session
  - cached plugin
  - tool_search
  - mcp tool
  - model provider
  - provider policy
  - deepseek
  - api or self-hosted
  - web chat
  - manual web login
  - browser
  - github
  - figma
  - data analytics
  - cloudflare
  - vercel
  - hugging face
  - product design
related_agents:
  - orchestrator
  - architect
  - qa
  - protective-supervisor
related_files:
  - src/data/delivery-system/toolInventory.ts
  - mcp/server.ts
  - docs/autopilot/delivery-system-model-policy.md
  - AGENTS.md
required_checks:
  - current_session_tools_checked
  - tool_search_confirms_deferred_tool
  - skill_workflow_read
  - cached_plugin_not_treated_as_callable
  - connector_scope_declared
  - provider_availability_verified
  - api_credit_or_self_hosting_cost_confirmed
  - free_tier_or_no_cost_confirmed
  - authentication_state_verified_without_token_disclosure
  - controlled_browser_evidence_required
  - fresh_chat_started_for_each_mode_test
  - remote_mutation_scope_declared
  - no_secret_exfiltration
stop_conditions:
  - cached_plugin_treated_as_callable
  - requested_plugin_unavailable
  - provider_availability_unverified
  - paid_model_or_credit_required_without_owner_decision
  - authentication_missing
  - browser_session_unavailable
  - mode_switch_unverified
  - remote_mutation_without_approval
  - secret_in_prompt
  - workflow_requires_unavailable_tool
must_not_assume:
  - Do not assume cached plugin bundles are callable.
  - Do not assume model provider policy records are active credentials or runtime connectors.
  - Do not use connector or plugin claims as source of truth without verification.
  - Do not call DeepSeek or another API/self-hosted provider until availability, cost or self-hosting, redaction, and official-doc checks pass.
  - Do not treat DeepSeek web chat login as a CLI, API runtime, connector, stable headless contract, or source of truth.
  - Do not skip skill workflow instructions when a skill applies.
  - Do not mutate remote services through a connector without explicit owner approval.
objective:
  - Keep plugin and skill routing read-only until a callable tool is confirmed.
  - Keep provider-policy routing read-only until credentialed runtime access is confirmed.
  - Treat DeepSeek web chat as a manual Browser-login advisory path with fresh-chat and mode-switch evidence.
  - Expose inventory guidance through the local MCP server without creating an execution authority.
  - Preserve source-of-truth boundaries for connector data, provider docs, local tests, and architecture records.
