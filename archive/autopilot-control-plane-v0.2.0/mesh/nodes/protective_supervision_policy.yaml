id: protective_supervision_policy
type: routing_policy
name: Protective supervision policy
question: "Does this task need currentness checks, agent-output handoff compilation, project progress tracking, or blocker review?"
why: "Agent work can drift when assumptions become stale, outputs are passed forward raw, progress is not explicit, or blockers have no owner. Protective supervision keeps the work report-first, source-grounded, and sequenced without creating a second runtime queue."
signals:
  - protective
  - guardrail
  - sentinel
  - currentness
  - latest
  - updates
  - context7
  - official docs
  - agent output
  - handoff
  - next agent
  - next input
  - progress
  - done
  - missing
  - waiting
  - dependency
  - blocker
  - blocked
  - stop condition
  - failed process
  - restart
  - session resume
related_agents:
  - architect
  - memory
  - qa
  - security
related_files:
  - src/data/delivery-system/protectiveSupervision.ts
  - docs/autopilot/protective-supervision-operating-model.md
  - docs/autopilot/agent-handoff-packet-template.md
  - docs/autopilot/project-progress-ledger-template.md
  - docs/projects/<project-slug>/work-log.md
  - docs/projects/<project-slug>/decision-mesh/
  - AGENTS.md
required_checks:
  - project_scope_classified
  - official_docs_or_context7_for_currentness
  - source_pointer_recorded
  - redacted_context_only
  - agent_output_normalized
  - next_agent_scope_declared
  - progress_state_updated
  - blocker_owner_declared
  - waiting_dependency_declared
  - failure_reproduced_or_failure_pointer_recorded
  - affected_process_identified
  - progress_checkpoint_created_before_fix
  - affected_process_stopped_or_drained_before_fix
  - session_restarted_after_fix
  - continuity_updated_and_work_resumed
  - no_raw_project_log_storage
  - no_remote_mutation_without_approval
stop_conditions:
  - currentness_claim_without_source
  - raw_agent_output_used_as_next_prompt
  - missing_next_agent_scope
  - stale_progress_ledger
  - blocker_without_owner
  - waiting_state_without_dependency
  - duplicate_runtime_queue
  - remote_mutation_without_approval
  - paid_or_cloud_required_for_guardrail
  - raw_project_logs_copied_to_autopilot
  - fix_applied_to_running_process_without_stop_or_drain
  - session_restart_missing_after_process_fix
  - continuity_missing_after_restart
must_not_assume:
  - Do not pass raw agent output as the next prompt.
  - Do not create a duplicate runtime queue or approval authority.
  - Do not copy raw project logs into Autopilot.
  - Do not mutate GitHub, connectors, deployments, or project runtimes without owner approval.
  - Do not apply a fix to an affected running process before it is stopped or drained, unless the owner explicitly accepts a live-patch exception.
  - Do not continue after a restart without a continuity/progress update.
  - Do not make currentness claims without Context7, official docs, local evidence, or source pointers.
objective:
  - Run report-first currentness sentinel reviews for unstable guidance.
  - Compile reviewed agent outputs into bounded next-agent handoff packets.
  - Maintain visible progress states, blockers, waiting dependencies, and next action sequence.
  - For failed-process investigations, checkpoint state, stop or drain the affected process, apply the fix, restart or refresh the session, update continuity, and resume from the last verified state.
  - Feed prompt, mesh, model, context, observability, and project-work-log governance without becoming a runtime.
