id: model_spend_policy
type: routing_policy
name: Model spend policy
question: "Which model class is economically and technically appropriate for this task?"
why: "Most routine work should use local or low-cost workers, while subscription, free/no-cost, API, or self-hosted advisory models are reserved for strategic reasoning, review, audit, planning, and hard edge cases."
