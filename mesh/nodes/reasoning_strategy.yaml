id: reasoning_strategy
type: routing_policy
name: Strategic reasoning layer
question: "Does this task need frontier-level reasoning or should it stay with local workers?"
why: "Large and cloud reasoning models are most useful as strategic advisory, review, audit, planning, and edge-case analysis layers; routine worker workloads should stay local by default."
signals:
  - reasoning
  - frontier
  - free cloud
  - gemini
  - google ai subscription
  - gemini code assist
  - subscription cli
  - claude
  - anthropic
  - subscription interactive
  - openai
  - gpt
  - deepseek
  - qwen
  - structured output
  - function calling
  - task lane
  - provider policy
  - credentialed advisory
  - strategic
  - deep research
  - architecture
  - review
  - audit
  - planning
  - orchestration
  - edge-case
  - tradeoff
  - context7
  - best practices
  - local
  - non local
  - swarm
  - tool inventory
related_agents:
  - architect
  - security
  - business
  - qa
related_files:
  - src/data/delivery-system/modelPolicy.ts
  - src/data/delivery-system/toolInventory.ts
  - docs/autopilot/delivery-system-model-policy.md
  - AGENTS.md
required_checks:
  - local_worker_default
  - free_tier_or_no_cost_confirmed
  - subscription_entitlement_confirmed_for_subscription_tools
  - google_ai_subscription_entitlement_confirmed_for_gemini_cli
  - api_credit_or_self_hosting_cost_confirmed
  - redacted_context_only
  - context7_or_official_docs_verified
  - gemini_brainstorm_claims_labeled_and_verified
  - owner_cost_decision_for_credentialed_provider
  - authentication_state_verified_without_token_disclosure
  - no_api_budget_or_credit_claim_for_subscription_tools
  - no_gemini_api_budget_or_key_claim_for_subscription_cli
  - frontier_reasoning_only_for_strategy_review_audit
  - no_frontier_for_boilerplate
  - verify_external_claims
stop_conditions:
  - non_local_worker_dependency
  - cloud_model_for_routine_worker_loop
  - frontier_used_for_simple_worker_task
  - provider_availability_unverified
  - paid_model_or_credit_required
  - paid_model_or_credit_required_without_owner_decision
  - subscription_entitlement_unverified
  - google_ai_subscription_entitlement_unverified
  - api_credit_path_requested_without_owner_decision
  - gemini_api_key_or_paid_api_path_requested_without_owner_decision
  - authentication_missing
  - private_data_not_redacted
  - model_output_used_as_source_of_truth
  - technology_claim_without_context7_or_official_docs
  - gemini_claim_adopted_without_verification
must_not_assume:
  - Do not assume a cloud frontier model is available.
  - Do not assume a cloud model is free or safe to receive private context.
  - Do not treat Claude Code subscription access as metered API-credit access.
  - Do not treat Gemini CLI / Google AI subscription access as Gemini API budget or API-key access.
  - Do not treat a cached plugin bundle as callable model/tool availability.
  - Do not route routine worker tasks to non-local models by default.
  - Do not treat Gemini brainstorm output as verified technology guidance until Context7 or official docs verify it.
objective:
  - Keep routine coding, embeddings, RAG, indexing, automation, and summarization local by default.
  - Use external advisory reasoning only as redacted critique, brainstorming, validation, or second opinion after matching its entitlement path.
  - Route reasoning by task lane and provider policy before choosing GPT, Claude, Gemini, DeepSeek, Qwen, or deterministic tools.
  - Verify technology and best-practice claims through Context7 when connected, or official documentation as fallback.
  - Escalate to frontier reasoning only for deep research, architecture, review, audit, orchestration, and hard edge-case analysis.
