services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: autopilot_clientops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - clientops-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autopilot_clientops"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  clientops-postgres:
