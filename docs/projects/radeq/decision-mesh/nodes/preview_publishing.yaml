id: preview_publishing
type: delivery_gate
name: Preview publishing
question: "Does this implementation run produce a shareable preview URL before owner review?"
why: "Every web implementation run must produce a link visible from anywhere — not just local screenshots — so the owner can review the full page on any device before approving a production deploy."
mechanism: github_pages
mechanism_note: >
  GitHub Pages is the preferred preview mechanism for radeq.cz. Reasons: no Cloudflare
  Worker limits consumed, no additional secrets required beyond existing GitHub token,
  build_type already set to 'workflow' in repo Pages settings, and astro.config.mjs
  already supports DEPLOY_TARGET=github-pages (base: '/radeq').
preview_url_format: "https://sirradek.github.io/radeq/?v=<short-commit>"
signals:
  - preview
  - deploy
  - staging
  - branch deploy
  - review link
  - github pages
  - sirradek.github.io
related_agents:
  - worker
  - supervisor
related_files:
  - .github/workflows/preview-deploy.yml
  - astro.config.mjs
required_checks:
  - branch_pushed_to_github
  - preview_url_returned_in_process_report
  - preview_url_not_production_domain
  - no_production_deploy_without_owner_approval
stop_conditions:
  - preview_url_missing_from_process_report
  - production_radeq_cz_used_as_preview
  - deploy_overwrites_owner_approved_production_without_permission
objective:
  - Every implementation run on a web project returns a shareable preview URL.
  - Preview deploys to sirradek.github.io/radeq/ via GitHub Actions (withastro/action + deploy-pages).
  - URL includes ?v=<short-commit> for cache-busting and version identification.
  - Production deploy to radeq.cz requires explicit owner approval in a separate turn.
failure_modes:
  - id: PREV-FAIL-001
    condition: push_rejected_or_no_remote
    action: "Report push failure. Do not claim preview URL exists. Check branch protection rules and remote access."
  - id: PREV-FAIL-002
    condition: pages_source_not_set_to_workflow
    action: "Owner must enable: GitHub repo → Settings → Pages → Source = 'GitHub Actions'. One-time setup. build_type must equal 'workflow'."
  - id: PREV-FAIL-003
    condition: base_path_wrong_assets_broken
    action: "Build must use DEPLOY_TARGET=github-pages env var so astro.config.mjs sets base='/radeq'. Without this, all asset paths are broken (404 on CSS/JS). withastro/action workflow already sets this env var."
  - id: PREV-FAIL-004
    condition: deploy_job_failed_in_ci
    action: "Link to the failed Actions run URL. Do not report a preview URL. Fix the build locally first (npm run build with DEPLOY_TARGET=github-pages), then re-push."
  - id: PREV-FAIL-005
    condition: d1_form_not_functional_in_preview
    action: "Expected and documented. GitHub Pages serves only static files — D1/Cloudflare Worker is not available. Contact form submissions will fail. This is a visual preview only. Do not block deploy for this."
governance_note: >
  Owner has approved preview deploy to sirradek.github.io (GitHub Pages).
  This overwrites the current Pages deployment for the duration of review.
  Production deploy to radeq.cz requires a separate explicit owner approval turn.
  This node does not override RAD-DEPLOY-001; it adds a mandatory pre-approval step.
