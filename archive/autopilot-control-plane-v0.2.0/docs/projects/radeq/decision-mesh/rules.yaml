rules:
  - id: RAD-STATIC-001
    title: Core content remains static-readable
    applies_to:
      - static_public_site
    instruction: "Do not make primary content, navigation, CTA, or SEO text depend on WebGL or client-only JavaScript."
    severity: blocker
  - id: RAD-LEADS-001
    title: Lead data remains validated and minimized
    applies_to:
      - lead_capture_pipeline
    instruction: "Client and server validation, privacy minimization, and controlled D1 error behavior must remain intact."
    severity: blocker
  - id: RAD-OBS-001
    title: Radeq runtime logs stay project-owned
    applies_to:
      - runtime_observability_boundary
    instruction: "Diagnose Radeq runtime, deployment, client, lead API, SEO, and 3D symptoms inside the Radeq project mesh. Autopilot may record only redacted summaries and source pointers."
    severity: blocker
  - id: RAD-OBS-002
    title: Radeq diagnostics require bounded evidence
    applies_to:
      - runtime_observability_boundary
    instruction: "Define symptom, time window, evidence source, baseline metric, suspected layer, reproduction or counterexample, and fix verification before changing Radeq runtime behavior."
    severity: major
  - id: RAD-3D-001
    title: 3D remains optional
    applies_to:
      - three_d_mascot_addon
    instruction: "3D mascot changes require reduced-motion behavior, WebGL fallback, mobile check, cleanup, and asset-license evidence."
    severity: major
  - id: RAD-SEO-001
    title: Speed and SEO are protected
    applies_to:
      - seo_performance_surface
    instruction: "Performance or SEO-impacting changes require measurement or an explicit note that measurement was not available."
    severity: major
  - id: RAD-DESIGN-001
    title: Proposal variants require separate composition logic
    applies_to:
      - static_public_site
      - seo_performance_surface
    instruction: "A/B/C/D proposal variants must differ by first-screen purpose, H1/H2, layout rhythm, section order, visual anchor, CTA logic, proof strategy, and mobile behavior. Palette-only or shared-shell variants are a stop condition."
    severity: blocker
  - id: RAD-DESIGN-002
    title: Design refinements require public mobile evidence
    applies_to:
      - static_public_site
      - seo_performance_surface
      - runtime_observability_boundary
    instruction: "Before claiming a Radeq preview refinement is ready, record the public preview URL or commit, mobile viewport evidence, overflow state, console state, metadata/indexability state, performance note, and rollback path."
    severity: major
