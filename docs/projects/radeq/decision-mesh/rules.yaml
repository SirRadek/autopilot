rules:
  - id: RAD-OFFER-001
    title: Primary offer is complete websites
    applies_to:
      - offer_positioning_conversion
      - static_public_site
    instruction: "The first public homepage direction must focus on complete websites for small businesses: structure, content, design, implementation, performance/SEO basics, and clear handoff. Do not narrow the primary positioning to WordPress/WooCommerce repairs unless the owner explicitly changes scope."
    severity: blocker
  - id: RAD-OFFER-002
    title: Paid entry product and CTA need owner lock
    applies_to:
      - offer_positioning_conversion
      - lead_capture_pipeline
    instruction: "The homepage and lead path must use an owner-approved paid entry product and CTA for the complete-website path before implementation. Do not treat the prior under-5000-CZK repair/check package as locked."
    severity: blocker
  - id: RAD-OFFER-003
    title: Broader services remain secondary
    applies_to:
      - offer_positioning_conversion
      - seo_performance_surface
    instruction: "SEO, automation, AI helpers, PC support, migrations, Shopify, WordPress, WooCommerce, and broader custom work may appear only as secondary or implementation-specific paths until the complete-website offer is clear."
    severity: major
  - id: RAD-OFFER-004
    title: Public effects do not replace positioning
    applies_to:
      - offer_positioning_conversion
      - static_public_site
      - three_d_mascot_addon
    instruction: "A/B/C/D visual variants, demo shop, and 3D mascot are proof or review mechanisms; they must not become the main public decision path on the homepage."
    severity: major
  - id: RAD-OFFER-005
    title: Safety proof is part of the offer
    applies_to:
      - offer_positioning_conversion
      - lead_capture_pipeline
    instruction: "Complete-website copy must include proof of safe process: scope clarity, content/SEO structure, technical implementation, testing, performance/accessibility checks, and clear handoff. Risky recovery, payment, large migration, or complex ecommerce promises require a separate owner-approved scope."
    severity: major
  - id: RAD-STATIC-001
    title: Core content remains static-readable
    applies_to:
      - static_public_site
    instruction: "Do not make primary content, navigation, CTA, or SEO text depend on WebGL or client-only JavaScript."
    severity: blocker
  - id: RAD-LEADS-001
    title: Lead data remains validated and minimized
    applies_to:
      - lead_capture_pipeline
    instruction: "Client and server validation, privacy minimization, and controlled D1 error behavior must remain intact."
    severity: blocker
  - id: RAD-OBS-001
    title: Radeq runtime logs stay project-owned
    applies_to:
      - runtime_observability_boundary
    instruction: "Diagnose Radeq runtime, deployment, client, lead API, SEO, and 3D symptoms inside the Radeq project mesh. Autopilot may record only redacted summaries and source pointers."
    severity: blocker
  - id: RAD-OBS-002
    title: Radeq diagnostics require bounded evidence
    applies_to:
      - runtime_observability_boundary
    instruction: "Define symptom, time window, evidence source, baseline metric, suspected layer, reproduction or counterexample, and fix verification before changing Radeq runtime behavior."
    severity: major
  - id: RAD-3D-001
    title: 3D remains optional
    applies_to:
      - three_d_mascot_addon
    instruction: "3D mascot changes require reduced-motion behavior, WebGL fallback, mobile check, cleanup, and asset-license evidence."
    severity: major
  - id: RAD-SEO-001
    title: Speed and SEO are protected
    applies_to:
      - seo_performance_surface
    instruction: "Performance or SEO-impacting changes require measurement or an explicit note that measurement was not available."
    severity: major
  - id: RAD-DESIGN-001
    title: Proposal variants require separate composition logic
    applies_to:
      - static_public_site
      - seo_performance_surface
    instruction: "A/B/C/D proposal variants must differ by first-screen purpose, H1/H2, layout rhythm, section order, visual anchor, CTA logic, proof strategy, and mobile behavior. Palette-only or shared-shell variants are a stop condition."
    severity: blocker
  - id: RAD-DESIGN-002
    title: Design refinements require public mobile evidence
    applies_to:
      - static_public_site
      - seo_performance_surface
      - runtime_observability_boundary
    instruction: "Before claiming a Radeq preview refinement is ready, record the public preview URL or commit, mobile viewport evidence, overflow state, console state, metadata/indexability state, performance note, and rollback path."
    severity: major
  - id: RAD-SHOWCASE-001
    title: Public showcases stay static and secondary
    applies_to:
      - public_showcase_examples
      - static_public_site
      - offer_positioning_conversion
    instruction: "The Czech /ukazky hub and detail pages may present public-safe examples for chatbot, automation, and offer/e-shop inquiry paths, but they must stay secondary to the complete-website homepage offer and must not replace or redirect old /demo routes without a separate owner decision."
    severity: major
  - id: RAD-SHOWCASE-002
    title: Static chatbot is not AI or model-backed
    applies_to:
      - public_showcase_examples
      - lead_capture_pipeline
    instruction: "The /ukazky/chatbot page must remain a static rule-based guide over prepared data. It must not use LLM, RAG, model APIs, network calls, localStorage, analytics, backend inference, or hidden lead submission. AI may be mentioned only as a later optional layer after sources, boundaries, data protection, and human handoff are clear."
    severity: blocker
  - id: RAD-SHOWCASE-003
    title: E-shop showcase is inquiry only
    applies_to:
      - public_showcase_examples
      - lead_capture_pipeline
    instruction: "The /ukazky/nabidka-eshop page may explain clearer offers and inquiry paths, but it must not implement checkout, payment, binding order flow, delivery data collection, or payment-data prompts."
    severity: blocker
  - id: RAD-EMAIL-001
    title: Fastmail is selected for human mailbox hosting
    applies_to:
      - domain_email_research
      - lead_capture_pipeline
    instruction: "Fastmail is the owner-confirmed human mailbox provider for radeq.cz, with siroky@radeq.cz, info@radeq.cz, and poptavky@radeq.cz working. Keep Cloudflare as DNS/control surface, keep DMARC at p=none during initial monitoring, and still distinguish mailbox hosting from forwarding, transactional email, and future form backend work. Do not change production deploy, lead API, or provider configuration without an explicit owner decision."
    severity: blocker
  - id: RAD-EMAIL-002
    title: Lead notification email is transactional and fail-soft
    applies_to:
      - domain_email_research
      - lead_capture_pipeline
    instruction: "The contact form may send a server-side Cloudflare Email Sending notification to poptavky@radeq.cz only after successful D1 storage. Email sending failures must be logged without exposing lead details and must not turn a successful stored lead into a visitor-facing error."
    severity: blocker
  - id: RAD-DEPLOY-001
    title: GitHub-first staging before Cloudflare deploy
    applies_to:
      - static_public_site
      - lead_capture_pipeline
      - runtime_observability_boundary
    instruction: "Stage Radeq website changes through GitHub branches and PR review first. Do not deploy Cloudflare Worker radeq, Cloudflare Pages radeq-cz, or production-domain changes without explicit owner approval in the current turn."
    severity: blocker
  - id: RAD-PREVIEW-001
    title: Every implementation run produces a shareable preview URL
    applies_to:
      - preview_publishing
      - static_public_site
    instruction: "After every web implementation run, push the branch to GitHub and return a shareable preview URL in the process report. Acceptable targets: workers.dev subdomain via wrangler deploy --env preview, or Cloudflare Pages branch preview. Do not use the production radeq.cz domain as a preview target. If preview deployment fails, report the failure mode (see preview_publishing.yaml failure_modes) and the exact owner action required — do not silently omit the URL from the report."
    severity: major
