edges:
  - from: offer_positioning_conversion
    to: static_public_site
    relation: defines_purpose
    weight: 0.92
    why: "The static homepage must serve the locked primary offer and visitor action before broader portfolio content."
  - from: offer_positioning_conversion
    to: lead_capture_pipeline
    relation: drives_conversion
    weight: 0.84
    why: "The lead form and CTA copy must collect the right complete-website context without broad or unsafe promises."
  - from: offer_positioning_conversion
    to: seo_performance_surface
    relation: sets_content_strategy
    weight: 0.82
    why: "SEO topics and metadata should support complete-website delivery before wider services."
  - from: offer_positioning_conversion
    to: three_d_mascot_addon
    relation: constrains_optional_effects
    weight: 0.72
    why: "3D and A/B/C/D effects must support proof and memorability without replacing the primary offer."
  - from: static_public_site
    to: seo_performance_surface
    relation: requires
    weight: 0.88
    why: "The public site must remain SEO-friendly and fast."
  - from: lead_capture_pipeline
    to: static_public_site
    relation: extends
    weight: 0.78
    why: "Lead capture is part of the public conversion flow."
  - from: runtime_observability_boundary
    to: static_public_site
    relation: diagnoses
    weight: 0.84
    why: "Radeq public-site symptoms must be diagnosed in the Radeq project context."
  - from: runtime_observability_boundary
    to: lead_capture_pipeline
    relation: diagnoses
    weight: 0.82
    why: "Lead API and D1 symptoms require project-owned runtime evidence and privacy-safe summaries."
  - from: runtime_observability_boundary
    to: seo_performance_surface
    relation: informs
    weight: 0.86
    why: "Performance and SEO bottlenecks need baseline metrics and project-owned evidence."
  - from: three_d_mascot_addon
    to: static_public_site
    relation: enhances
    weight: 0.64
    why: "3D is an optional enhancement, not the content carrier."
  - from: three_d_mascot_addon
    to: seo_performance_surface
    relation: constrained_by
    weight: 0.82
    why: "3D must not damage performance, mobile usability, or SEO content."
  - from: runtime_observability_boundary
    to: three_d_mascot_addon
    relation: diagnoses_optional_layer
    weight: 0.7
    why: "WebGL and 3D issues must remain optional-layer diagnostics and cannot block core content."
  - from: public_showcase_examples
    to: static_public_site
    relation: extends
    weight: 0.9
    why: "The /ukazky pages extend the public static site and must remain SEO-readable without client-only primary content."
  - from: public_showcase_examples
    to: offer_positioning_conversion
    relation: constrained_by
    weight: 0.86
    why: "Public examples can prove capability but must not replace the homepage's complete-website offer or CTA hierarchy."
  - from: public_showcase_examples
    to: seo_performance_surface
    relation: requires
    weight: 0.82
    why: "The examples are public indexed pages and need canonical URLs, sitemap coverage, static copy, and mobile checks."
  - from: public_showcase_examples
    to: lead_capture_pipeline
    relation: hands_off_to
    weight: 0.72
    why: "Showcase CTAs may point to the existing contact form but must not add hidden submission, prefill, or new lead API behavior."
  - from: domain_email_research
    to: lead_capture_pipeline
    relation: future_integration
    weight: 0.7
    why: "Future form notifications may use mailbox, forwarding, or transactional email, but provider setup is separate from current static pages."
