id: model_spend_policy
type: routing_policy
name: Model spend policy
question: "Which model class is economically and technically appropriate for this task?"
why: "Most routine work should use local or low-cost workers, while free/no-cost cloud advisory models and frontier models are reserved for strategic reasoning, review, audit, planning, and hard edge cases."
signals:
  - model spend
  - provider
  - openai
  - gpt
  - deepseek
  - qwen
  - claude
  - anthropic
  - subscription interactive
  - api credit
  - self hosted
  - structured output
  - function calling
  - task lane
  - low cost
  - free cloud
  - credentialed provider
  - frontier
  - gemini
  - reasoning
  - context7
  - best practices
  - local worker
  - cloud worker
  - deterministic tools
related_agents:
  - architect
  - security
  - business
  - qa
related_files:
  - src/data/delivery-system/modelSpend.ts
  - src/data/delivery-system/modelPolicy.ts
  - src/data/delivery-system/toolInventory.ts
  - docs/autopilot/delivery-system-model-policy.md
required_checks:
  - provider_availability_verified
  - free_tier_or_no_cost_confirmed
  - subscription_entitlement_confirmed_for_subscription_tools
  - api_credit_or_self_hosting_cost_confirmed
  - redacted_context_only
  - context7_or_official_docs_verified
  - gemini_brainstorm_claims_labeled_and_verified
  - owner_cost_decision_for_credentialed_provider
  - authentication_state_verified_without_token_disclosure
  - no_api_budget_or_credit_claim_for_subscription_tools
  - factual_claims_verified
  - choose_smallest_safe_model_class
  - disclose_model_choice_when_risk_affects_delivery
  - keep_frontier_for_reasoning
stop_conditions:
  - provider_availability_unverified
  - non_local_worker_dependency
  - cloud_model_for_routine_worker_loop
  - frontier_used_for_simple_worker_task
  - paid_model_or_credit_required
  - paid_model_or_credit_required_without_owner_decision
  - subscription_entitlement_unverified
  - api_credit_path_requested_without_owner_decision
  - authentication_missing
  - private_data_not_redacted
  - model_output_used_as_source_of_truth
  - technology_claim_without_context7_or_official_docs
  - gemini_claim_adopted_without_verification
  - model_choice_affects_risk_without_disclosure
must_not_assume:
  - Do not make DeepSeek, Qwen, Gemini, OpenAI, Claude, or any single provider mandatory.
  - Do not collapse Claude subscription access into API-credit spend policy.
  - Do not use API/self-hosted providers without explicit cost or infrastructure checks.
  - Do not route routine worker loops to a cloud model by default.
  - Do not adopt advisory technology claims without Context7 or official-docs verification.
objective:
  - Keep model selection provider-neutral and cost-aware.
  - Separate deterministic/local, free-cloud advisory, subscription-interactive, API-credit, and self-hosted lanes.
  - Allow free/no-cost cloud advisory reasoning when it is redacted, useful, and verified.
  - Pair Gemini brainstorming with Context7 or official-docs verification for current technical claims.
  - Escalate only when risk, ambiguity, or review value justifies it.
