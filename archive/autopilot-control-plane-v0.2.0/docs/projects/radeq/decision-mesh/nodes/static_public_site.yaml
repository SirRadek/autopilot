id: static_public_site
type: runtime_surface
name: Static public site
question: "Does this change preserve Radeq as a fast public Astro site with readable static content?"
why: "Radeq's main value is a fast public website for web systems, conversion flows, SEO structures, and lightweight automation work."
signals:
  - astro
  - public site
  - static
  - landing
  - content
  - route
related_agents:
  - frontend
  - seo_performance
  - qa
related_files:
  - docs/projects/radeq/architecture.md
required_checks:
  - static_content_readable
  - responsive_check
  - build_check
  - seo_metadata_check
stop_conditions:
  - primary_content_hidden_in_javascript
  - route_structure_unknown
objective:
  - Keep the public site fast, readable, and SEO-friendly.
